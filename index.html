<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gold & Silver Board Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Gold & Silver Rate Board</h1>

<div class="top-bar">
  <div id="date"></div>
  <div id="time"></div>
</div>

<div class="grid">

  <div class="card">
    <h2>Gold / Tola</h2>
    <div id="goldTola" class="price">Rs 0</div>
  </div>

  <div class="card">
    <h2>Gold / 10g</h2>
    <div id="gold10g" class="price">Rs 0</div>
  </div>

  <div class="card">
    <h2>Silver / Tola</h2>
    <div id="silverTola" class="price">Rs 0</div>
  </div>

  <div class="card">
    <h2>Silver / 10g</h2>
    <div id="silver10g" class="price">Rs 0</div>
  </div>

</div>

<!-- TICKER -->
<div class="ticker">
  <div id="ticker"></div>
</div>

<script src="script.js"></script>
</body>
</html>
